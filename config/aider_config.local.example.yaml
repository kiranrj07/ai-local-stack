# Aider config — LOCAL profile. Save as ~/.aider.conf.yml or pass via --config.
# Aider 0.86+: for ollama_chat/* models, set OLLAMA_API_BASE via set-env (NOT --api-base).

model: ollama_chat/qwen2.5-coder:14b
weak-model: ollama_chat/qwen2.5-coder:7b

set-env:
  - OLLAMA_API_BASE=http://localhost:11434

# Privacy
analytics: false
gitignore: true

# Safety: review before commits
auto-commits: false
dirty-commits: false

show-model-warnings: false
