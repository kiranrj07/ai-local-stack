source:
  dir: .
  min_bytes: 16
  max_bytes: 2000000
exclude_dirs:
- .git
- node_modules
- venv
- .venv
- __pycache__
- dist
- build
- .cache
- indexes
- logs
- .mypy_cache
- .pytest_cache
- .ruff_cache
- .next
- .terraform
include_extensions:
- .py
- .js
- .ts
- .tsx
- .jsx
- .md
- .txt
- .yaml
- .yml
- .json
- .sh
- .tf
- .go
- .java
chunking:
  chunk_size: 1000
  chunk_overlap: 200
retrieval:
  vector_top_k: 8
  bm25_top_k: 8
  final_top_k: 5
  rerank: true
  compression:
    enabled: false
    min_chars_to_compress: 6000
storage:
  faiss_dir: indexes/faiss
  bm25_dir: indexes/bm25
  metadata_db: indexes/metadata.sqlite3
generation:
  override_llm_model: null
  temperature: 0.2
  max_output_tokens: 1024
  cite_sources: true
logging:
  level: INFO
  file: logs/rag.log
