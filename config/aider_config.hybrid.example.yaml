# Aider config — HYBRID profile. Routes inference to Ubuntu worker via SSH tunnel.
# Start the tunnel first:  aitool tunnel

model: ollama_chat/qwen2.5-coder:14b
weak-model: ollama_chat/qwen2.5-coder:7b

set-env:
  - OLLAMA_API_BASE=http://localhost:11435

# Privacy
analytics: false
gitignore: true

# Safety: review before commits
auto-commits: false
dirty-commits: false

show-model-warnings: false
