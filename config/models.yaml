# Catalog of models known to this stack. scripts/pull_models_local.sh and pull_models_remote.sh
# read this file to know what to pull.

# Coder LLMs (served by Ollama)
llms:
  - name: "qwen2.5-coder:14b"
    role: "primary"
    size_gb: 9.0
    notes: "Safe default. ~9 GB; runs on Mac M4 Pro 24 GB or Ubuntu RTX 4050 (partial GPU offload)."
  - name: "qwen2.5-coder:7b"
    role: "lightweight"
    size_gb: 4.7
    notes: "Fast everyday model. Recommend on Mac when running with VS Code + agents."
  - name: "qwen3:14b"
    role: "general"
    size_gb: 9.3
    notes: "Already present on both machines. Not coder-tuned but capable."
  # Qwen3-Coder / Qwen3-Coder-Next: not in the official Ollama library as of writing.
  # If/when published, add it here, e.g.:
  # - name: "qwen3-coder:14b"
  #   role: "primary"
  #   size_gb: 9.0
  #   notes: "Successor to qwen2.5-coder. Verify on https://ollama.com/library before pulling."

# Embedding models
embeddings:
  - name: "nomic-embed-text"
    backend: "ollama"
    dim: 768
    size_gb: 0.27
    notes: "Default. Runs inside Ollama — no extra Python deps."
  - name: "BAAI/bge-base-en-v1.5"
    backend: "huggingface"
    dim: 768
    size_gb: 0.44
    notes: "Alternative. Loaded via sentence-transformers in-process."

# Rerankers (optional)
rerankers:
  - name: "BAAI/bge-reranker-base"
    backend: "huggingface"
    size_gb: 1.1
    notes: "Cross-encoder reranker. Set retrieval.rerank=true in rag_config.yaml to enable."
